<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚠️ dscad请注意</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft JhengHei", sans-serif;
  background: #1a1a2e;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 40px 28px;
  max-width: 440px;
  width: 100%;
  text-align: center;
  position: relative;
  z-index: 10;
  box-shadow: 0 0 60px rgba(255, 87, 34, 0.3);
}

.angry-emoji {
  font-size: 80px;
  margin-bottom: 16px;
  animation: shake 0.3s ease-in-out infinite;
  display: inline-block;
}
@keyframes shake {
  0%, 100% { transform: rotate(-8deg) scale(1); }
  25% { transform: rotate(8deg) scale(1.05); }
  50% { transform: rotate(-6deg) scale(1.02); }
  75% { transform: rotate(6deg) scale(1.05); }
}

h1 {
  color: #d32f2f;
  font-size: 1.8rem;
  margin-bottom: 8px;
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.subtitle {
  color: #e65100;
  font-size: 1rem;
  margin-bottom: 24px;
  font-weight: bold;
}

.anger-meter {
  background: #ffebee;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
}
.meter-label {
  color: #c62828;
  font-size: 0.9rem;
  margin-bottom: 10px;
  font-weight: bold;
}
.meter-bar-bg {
  background: #ffcdd2;
  border-radius: 10px;
  height: 16px;
  overflow: hidden;
  position: relative;
}
.meter-bar-fill {
  background: linear-gradient(90deg, #ff9800, #f44336, #d32f2f);
  height: 100%;
  border-radius: 10px;
  width: 87%;
  animation: meterPulse 2s ease-in-out infinite;
  position: relative;
}
@keyframes meterPulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}
.meter-bar-fill::after {
  content: '🔥';
  position: absolute;
  right: -2px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
}
.meter-text {
  color: #b71c1c;
  font-size: 0.85rem;
  margin-top: 8px;
}

.message-box {
  background: #fff3e0;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
  text-align: left;
  border-left: 4px solid #ff5722;
}
.message-box .from {
  color: #bf360c;
  font-size: 0.85rem;
  margin-bottom: 8px;
  font-weight: bold;
}
.message-box .msg {
  color: #4e342e;
  font-size: 1rem;
  line-height: 1.8;
}

.countdown-box {
  background: linear-gradient(135deg, #ffebee, #fce4ec);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
}
.countdown-label {
  color: #c62828;
  font-size: 0.9rem;
  margin-bottom: 6px;
  font-weight: bold;
}
.countdown-time {
  color: #b71c1c;
  font-size: 2rem;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  animation: countdownPulse 1s ease-in-out infinite;
}
@keyframes countdownPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.boom-btn {
  background: linear-gradient(135deg, #ff5722, #d32f2f);
  color: white;
  border: none;
  padding: 16px 40px;
  border-radius: 30px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
  animation: btnGlow 2s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.boom-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 30px rgba(255, 87, 34, 0.6);
}
.boom-btn:active {
  transform: scale(0.95);
}
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 15px rgba(255, 87, 34, 0.4); }
  50% { box-shadow: 0 0 35px rgba(255, 87, 34, 0.8); }
}

.hint {
  color: #9e9e9e;
  font-size: 0.75rem;
  margin-top: 14px;
}

/* ===== 爆炸全屏 ===== */
.explosion-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  pointer-events: none;
}
.explosion-overlay.active {
  display: block;
  pointer-events: all;
}

.explosion-flash {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: white;
  opacity: 0;
  animation: flashBang 0.6s ease-out forwards;
}
@keyframes flashBang {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

.explosion-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 5rem;
  font-weight: bold;
  color: #ff5722;
  text-shadow: 0 0 40px rgba(255, 87, 34, 0.8), 0 0 80px rgba(255, 87, 34, 0.4);
  animation: boomText 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  white-space: nowrap;
}
@keyframes boomText {
  0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
  100% { transform: translate(-50%, -50%) scale(1) rotate(3deg); opacity: 1; }
}

.explosion-sub {
  position: absolute;
  top: 62%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 1.2rem;
  color: #ffcdd2;
  text-shadow: 0 0 10px rgba(255, 87, 34, 0.6);
  animation: boomText 0.6s 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  white-space: nowrap;
}

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.smoke {
  position: absolute;
  border-radius: 50%;
  background: rgba(100, 100, 100, 0.3);
  filter: blur(20px);
  pointer-events: none;
}

/* 爆炸后可以点击的重来按钮 */
.restart-btn {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%) scale(0);
  background: white;
  color: #d32f2f;
  border: 2px solid #d32f2f;
  padding: 12px 30px;
  border-radius: 24px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  animation: boomText 0.5s 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  pointer-events: all;
  z-index: 101;
}
.restart-btn:hover {
  background: #d32f2f;
  color: white;
}

/* 背景飘落的火焰 */
.fire-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.fire-drop {
  position: absolute;
  font-size: 1.5rem;
  animation: fireFall linear infinite;
  opacity: 0.6;
}
@keyframes fireFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
  100% { transform: translateY(105vh) rotate(360deg); opacity: 0.1; }
}

.warning-strip {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: repeating-linear-gradient(
    45deg,
    #ff5722,
    #ff5722 10px,
    #1a1a2e 10px,
    #1a1a2e 20px
  );
  height: 6px;
  z-index: 5;
}
.warning-strip-top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: repeating-linear-gradient(
    45deg,
    #ff5722,
    #ff5722 10px,
    #1a1a2e 10px,
    #1a1a2e 20px
  );
  height: 6px;
  z-index: 5;
}

@media (max-width: 480px) {
  .card { padding: 30px 20px; }
  h1 { font-size: 1.5rem; }
  .angry-emoji { font-size: 60px; }
  .explosion-text { font-size: 3rem; }
  .countdown-time { font-size: 1.6rem; }
}
</style>
</head>
<body>

<!-- 背景火焰 -->
<div class="fire-container" id="fireContainer"></div>

<!-- 警示条纹 -->
<div class="warning-strip-top"></div>
<div class="warning-strip"></div>

<div class="card" id="mainCard">
  <div class="angry-emoji">😤</div>
  <h1>李泰祺！！！</h1>
  <p class="subtitle">一上午不回消息！！</p>

  <div class="anger-meter">
    <div class="meter-label">🔥 当前怒气值</div>
    <div class="meter-bar-bg">
      <div class="meter-bar-fill" id="angerFill"></div>
    </div>
    <div class="meter-text" id="angerText">87% — 快到极限了</div>
  </div>

  <div class="message-box">
    <div class="from">📢 来自生气的人：</div>
    <div class="msg" id="angryMsg">
      你是不是把手机扔了？？<br>
      还是打算装失忆？？<br>
      限时 10 秒内回复<br>
      否则后果自负！！
    </div>
  </div>

  <div class="countdown-box">
    <div class="countdown-label">⏳ 回复倒计时</div>
    <div class="countdown-time" id="countdown">00:10</div>
  </div>

  <button class="boom-btn" onclick="triggerExplosion()">💥 我就是不来 — 引爆</button>
  <div class="hint">（点了别后悔）</div>
</div>

<!-- 爆炸特效层 -->
<div class="explosion-overlay" id="explosionOverlay">
  <div class="explosion-flash"></div>
  <div class="explosion-text">💥 炸了！！</div>
  <div class="explosion-sub">李泰祺，你完了</div>
  <button class="restart-btn" onclick="restart()">再来一次 💢</button>
</div>

<script>
// === 背景火焰 ===
const fireEmojis = ['🔥', '💥', '💢', '😡', '⚡', '🧨'];
const fireContainer = document.getElementById('fireContainer');
for (let i = 0; i < 20; i++) {
  const drop = document.createElement('div');
  drop.className = 'fire-drop';
  drop.innerText = fireEmojis[Math.floor(Math.random() * fireEmojis.length)];
  drop.style.left = Math.random() * 100 + '%';
  drop.style.animationDuration = (3 + Math.random() * 5) + 's';
  drop.style.animationDelay = (Math.random() * 5) + 's';
  drop.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
  fireContainer.appendChild(drop);
}

// === 怒气值自动上涨 ===
let anger = 87;
const angerFill = document.getElementById('angerFill');
const angerText = document.getElementById('angerText');
const angerMessages = [
  { min: 0, text: '还行，暂时没生气' },
  { min: 30, text: '有点不开心了...' },
  { min: 50, text: '明显不高兴！！' },
  { min: 70, text: '很生气！！' },
  { min: 87, text: '87% — 快到极限了' },
  { min: 93, text: '93% — 随时可能爆炸' },
  { min: 97, text: '97% — 只有回复能救你' },
  { min: 100, text: '100% — 💥已经炸了💥' }
];

setInterval(() => {
  if (anger < 100) {
    anger += Math.random() > 0.5 ? 1 : 0;
    if (anger > 100) anger = 100;
    angerFill.style.width = anger + '%';
    let msg = angerMessages[0].text;
    for (const m of angerMessages) {
      if (anger >= m.min) msg = m.text;
    }
    angerText.innerText = msg;
  }
}, 2000);

// === 倒计时 ===
let countdownSec = 10;
const countdownEl = document.getElementById('countdown');
const countdownTimer = setInterval(() => {
  countdownSec--;
  if (countdownSec <= 0) {
    clearInterval(countdownTimer);
    countdownSec = 0;
    triggerExplosion();
  }
  const m = String(Math.floor(countdownSec / 60)).padStart(2, '0');
  const s = String(countdownSec % 60).padStart(2, '0');
  countdownEl.innerText = m + ':' + s;
}, 1000);

// === 轮换生气语录 ===
const angryMessages = [
  "你是不是把手机扔了？？<br>还是打算装失忆？？<br>限时 10 秒内回复<br>否则后果自负！！",
  "消息已读不回？？？<br>行，你号没了<br>倒计时还在跑<br>自己看着办吧！",
  "一整个上午！！<br>你是去火星了吗？？<br>地球人都在等回复<br>你搁这修仙呢？？",
  "我数到三！！<br>三...二...<br>算了直接炸吧<br>忍够久了！！",
  "手机是不是被你吃了？？<br>还是信号塔给你拆了？？<br>给你最后机会<br>快！回！复！"
];
let msgIndex = 0;
setInterval(() => {
  msgIndex = (msgIndex + 1) % angryMessages.length;
  document.getElementById('angryMsg').innerHTML = angryMessages[msgIndex];
}, 4000);

// === 爆炸特效 ===
function triggerExplosion() {
  clearInterval(countdownTimer);
  const overlay = document.getElementById('explosionOverlay');
  overlay.classList.add('active');

  // 粒子爆炸
  const colors = ['#ff5722', '#ff9800', '#f44336', '#ffeb3b', '#ff1744', '#d50000', '#ffab00'];
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;

  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 12;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = centerX + 'px';
    p.style.top = centerY + 'px';

    const angle = (Math.PI * 2 / 60) * i + Math.random() * 0.5;
    const speed = 200 + Math.random() * 500;
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed;

    overlay.appendChild(p);

    p.animate([
      { transform: 'translate(0, 0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
    ], {
      duration: 800 + Math.random() * 600,
      easing: 'cubic-bezier(0, 0, 0.2, 1)',
      fill: 'forwards'
    });
  }

  // 烟雾
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'smoke';
    const smokeSize = 60 + Math.random() * 100;
    s.style.width = smokeSize + 'px';
    s.style.height = smokeSize + 'px';
    s.style.left = (centerX - 50 + Math.random() * 100) + 'px';
    s.style.top = (centerY - 50 + Math.random() * 100) + 'px';

    overlay.appendChild(s);

    const dxS = (Math.random() - 0.5) * 300;
    const dyS = (Math.random() - 0.5) * 300;
    s.animate([
      { transform: 'scale(1)', opacity: 0.5 },
      { transform: `translate(${dxS}px, ${dyS}px) scale(3)`, opacity: 0 }
    ], {
      duration: 1500 + Math.random() * 500,
      easing: 'ease-out',
      fill: 'forwards'
    });
  }

  // 震动卡片
  const mainCard = document.getElementById('mainCard');
  mainCard.animate([
    { transform: 'translate(0, 0)' },
    { transform: 'translate(-10px, -5px)' },
    { transform: 'translate(10px, 5px)' },
    { transform: 'translate(-5px, 10px)' },
    { transform: 'translate(5px, -10px)' },
    { transform: 'translate(0, 0) scale(0.8)', opacity: 0.3 }
  ], {
    duration: 600,
    fill: 'forwards'
  });
}

// === 重来 ===
function restart() {
  const overlay = document.getElementById('explosionOverlay');
  overlay.classList.remove('active');
  // 清除粒子和烟雾
  overlay.querySelectorAll('.particle, .smoke').forEach(el => el.remove());

  // 重置卡片
  const mainCard = document.getElementById('mainCard');
  mainCard.animate([
    { transform: 'scale(0.8)', opacity: 0.3 },
    { transform: 'scale(1)', opacity: 1 }
  ], { duration: 400, fill: 'forwards' });

  // 重置倒计时
  countdownSec = 10;
  countdownEl.innerText = '00:10';
  const newTimer = setInterval(() => {
    countdownSec--;
    if (countdownSec <= 0) {
      clearInterval(newTimer);
      countdownSec = 0;
      triggerExplosion();
    }
    const m = String(Math.floor(countdownSec / 60)).padStart(2, '0');
    const s = String(countdownSec % 60).padStart(2, '0');
    countdownEl.innerText = m + ':' + s;
  }, 1000);

  // 重置怒气
  anger = 87;
  angerFill.style.width = '87%';
  angerText.innerText = '87% — 快到极限了';
}
</script>

</body>
</html>
